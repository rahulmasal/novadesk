<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <!-- Gear icon -->
  <g transform="translate(128, 128) scale(0.5)">
    <circle cx="256" cy="256" r="80" fill="none" stroke="white" stroke-width="40"/>
    <circle cx="256" cy="256" r="40" fill="white"/>
    <!-- Gear teeth -->
    <g fill="white">
      <rect x="236" y="100" width="40" height="60" rx="8"/>
      <rect x="236" y="352" width="40" height="60" rx="8"/>
      <rect x="100" y="236" width="60" height="40" rx="8"/>
      <rect x="352" y="236" width="60" height="40" rx="8"/>
      <rect x="140" y="140" width="50" height="50" rx="8" transform="rotate(45 165 165)"/>
      <rect x="322" y="140" width="50" height="50" rx="8" transform="rotate(-45 347 165)"/>
      <rect x="140" y="322" width="50" height="50" rx="8" transform="rotate(-45 165 347)"/>
      <rect x="322" y="322" width="50" height="50" rx="8" transform="rotate(45 347 347)"/>
    </g>
  </g>
  <!-- Ticket/desk line -->
  <rect x="160" y="380" width="192" height="20" rx="10" fill="white" opacity="0.8"/>
</svg>