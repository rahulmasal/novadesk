# ============================================
# NovaDesk Docker Compose Configuration
# ============================================
# Includes PostgreSQL database for easy setup
# ============================================

services:
  # NovaDesk Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novadesk-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://novadesk:${POSTGRES_PASSWORD}@db:5432/novadesk
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      REPORT_RECIPIENT: ${REPORT_RECIPIENT}
      CRON_SECRET: ${CRON_SECRET}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: novadesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: novadesk
      POSTGRES_USER: novadesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novadesk_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novadesk -d novadesk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional: SMTP Relay Service
  # Uncomment if you need a local SMTP relay
  # mail:
  #   image: bytemark/smtp
  #   container_name: novadesk-smtp
  #   restart: unless-stopped
  #   environment:
  #     SMART_HOST: ${SMTP_HOST:-smtp.gmail.com}
  #     SMART_HOST_PORT: ${SMTP_PORT:-587}
  #     SMTP_AUTH_MECHANISM: plain
  #     RELAY_AUTH_NAME: ${SMTP_USER}
  #     RELAY_AUTH_PASS: ${SMTP_PASS}
  #   ports:
  #     - "25:25"

volumes:
  postgres_data:
    driver: local